name: CI / CD

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

env:
  REGISTRY:    ghcr.io
  IMAGE_NAME:  ${{ github.repository }}/wallet-api 

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       walletdb_test
          POSTGRES_USER:     test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d walletdb_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          
      rabbitmq:
        image: rabbitmq:3-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
          
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore WalletApi.sln

      - name: Build
        run: dotnet build WalletApi.sln --no-restore --configuration Release

      - name: Run unit tests
        run: |
          dotnet test WalletApi.Tests/ \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=unit-tests.trx" \
            --collect:"XPlat Code Coverage"
          
      - name: Run integration tests
        env:
          ConnectionStrings__DefaultConnection: >-
            Host=localhost;Port=5432;Database=walletdb_test;
            Username=test_user;Password=test_password
          RabbitMq__Host: localhost
          RabbitMq__Username: guest
          RabbitMq__Password: guest
          Jwt__Secret: lorem-ipsum-dolor-sit-amet-consectetur-adipiscing-elit!!
          Jwt__Issuer: TestApi
          Jwt__Audience: TestApiUsers
        run: |
          dotnet test WalletApi.IntegrationTests/ \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=integration-tests.trx"
          
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: "**/*.trx"
          reporter: dotnet-trx

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}